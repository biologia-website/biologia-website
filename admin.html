<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佰洛生物 - 后台管理</title>
<style>
:root {--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;--text:#e4e7ed;--text2:#9ca3af;--primary:#0ea5e9;--primary-hover:#38bdf8;--accent:#10b981;--danger:#ef4444;--radius:8px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* Login */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:400px;max-width:92vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.login-logo{font-size:28px;font-weight:800;margin-bottom:8px}
.login-logo .icon{display:inline-block;background:linear-gradient(135deg,#0ea5e9,#10b981);color:#fff;width:44px;height:44px;line-height:44px;border-radius:12px;font-size:20px;margin-right:10px;vertical-align:-4px}
.login-sub{color:var(--text2);font-size:14px;margin-bottom:32px}
.login-input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s}
.login-input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--primary-hover)}
.login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none}
.login-debug{color:#f59e0b;font-size:12px;margin-top:12px;text-align:left;background:rgba(245,158,11,.1);padding:8px 12px;border-radius:var(--radius);white-space:pre-wrap;font-family:monospace;display:none;max-height:200px;overflow-y:auto}
/* App */
.app{display:none;min-height:100vh}
.topbar{display:flex;align-items:center;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px}
.topbar-brand{font-size:18px;font-weight:700}
.topbar-brand .icon{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;width:32px;height:32px;line-height:32px;border-radius:8px;font-size:14px;text-align:center;margin-right:8px;vertical-align:-3px}
.topbar-spacer{flex:1}
.topbar-btn{padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.topbar-btn:hover{background:var(--border)}
.tabs{display:flex;gap:4px;padding:12px 24px;background:var(--surface)}
.tab{padding:8px 20px;border-radius:var(--radius);font-size:14px;color:var(--text2);cursor:pointer;transition:all .2s}
.tab.active,.tab:hover{background:var(--primary);color:#fff}
.tab-content{display:none;padding:24px}
.tab-content.active{display:block}
/* Cards */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-header h2{font-size:20px;font-weight:700}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:none;transition:all .2s;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-accent{background:var(--accent);color:#fff}
.btn-warning{background:var(--warning);color:#000}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color .2s}
.card:hover{border-color:var(--primary)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.card-icon{font-size:28px}
.card-name{font-size:16px;font-weight:700;flex:1}
.card-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-hot{background:rgba(239,68,68,.2);color:var(--danger)}
.badge-cat{background:rgba(14,165,233,.2);color:var(--primary)}
.card-actions{display:flex;gap:8px;margin-top:12px}
.card-actions .btn{padding:5px 12px;font-size:12px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:2000;padding-top:40px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:700px;max-width:94vw;max-height:85vh;overflow-y:auto;padding:32px;box-shadow:0 8px 48px rgba(0,0,0,.4)}
.modal h3{font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:start}
.feature-list,.spec-list{margin-bottom:12px}
.feature-list .field-row,.spec-list .field-row{display:grid;gap:8px;align-items:start}
.feature-list .field-row{grid-template-columns:1fr 40px}
.spec-list .field-row{grid-template-columns:1fr 1fr 40px}
.toast-container{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:14px;animation:fadeIn .3s ease}
.toast.success{background:#064e3b;color:#6ee7b7}
.toast.error{background:#7f1d1d;color:#fca5a5}
.toast.info{background:#1e3a5f;color:#93c5fd}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.loading-mask{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:2500}
.loading-mask.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#statusMsg{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 20px;font-size:12px;color:var(--text2);z-index:100}
.inline-tag{display:inline-block;padding:2px 8px;background:rgba(14,165,233,.15);color:var(--primary);border-radius:4px;font-size:12px;margin-right:6px;cursor:pointer}
.inline-tag:hover{background:rgba(14,165,233,.3)}
</style>
<script>
// ===== PAGE INIT DEBUG PANEL =====
var _debug = [];
function _log(msg) { _debug.push(new Date().toISOString().slice(11,19) + ' ' + msg); console.log('[ADMIN]', msg); }

_log('Step 1: Script started');
_log('UserAgent: ' + navigator.userAgent.slice(0,80));
_log('Protocol: ' + location.protocol);
_log('Hostname: ' + location.hostname);

// Check if key APIs work
try { _log('localStorage: ' + (typeof localStorage !== 'undefined' ? 'OK' : 'MISSING')); } catch(e) { _log('localStorage: ERROR - ' + e.message); }
try { _log('sessionStorage: ' + (typeof sessionStorage !== 'undefined' ? 'OK' : 'MISSING')); } catch(e) { _log('sessionStorage: ERROR - ' + e.message); }
try { 
  var testKey = '_admin_test_' + Date.now();
  sessionStorage.setItem(testKey, '1');
  var testVal = sessionStorage.getItem(testKey);
  sessionStorage.removeItem(testKey);
  _log('sessionStorage RW: ' + (testVal==='1' ? 'OK' : 'FAIL - got "'+testVal+'"'));
} catch(e) { _log('sessionStorage RW: ERROR - ' + e.message); }
</script>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo"><span class="icon">佰</span>佰洛生物后台管理</div>
    <p class="login-sub">请输入管理员密码进入控制面板</p>
    <input type="password" id="pwdInput" class="login-input" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
    <div class="login-debug" id="loginDebug"></div>
  </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div class="app" id="app">
  <header class="topbar">
    <div class="topbar-brand"><span class="icon">佰</span>佰洛生物 · 内容管理</div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="showSettings()">设置</button>
    <button class="topbar-btn" onclick="doLogout()">退出登录</button>
  </header>
  <nav class="tabs">
    <div class="tab active" onclick="switchTab('products',this)">产品管理</div>
    <div class="tab" onclick="switchTab('services',this)">服务管理</div>
    <div class="tab" onclick="switchTab('seo',this)">SEO / 网站配置</div>
    <div class="tab" onclick="switchTab('export',this)">数据导出</div>
  </nav>
  <!-- Products Tab -->
  <div class="tab-content active" id="tab-products">
    <div class="section-header">
      <h2>产品管理</h2>
      <button class="btn btn-primary" onclick="openProductModal()">+ 添加产品</button>
    </div>
    <div id="productsList"></div>
  </div>
  <!-- Services Tab -->
  <div class="tab-content" id="tab-services">
    <div class="section-header">
      <h2>服务管理</h2>
      <button class="btn btn-primary" onclick="openServiceModal()">+ 添加服务</button>
    </div>
    <div id="servicesList"></div>
  </div>
  <!-- SEO Tab -->
  <div class="tab-content" id="tab-seo">
    <div class="section-header"><h2>SEO & 网站配置</h2></div>
    <div id="seoContent"></div>
  </div>
  <!-- Export Tab -->
  <div class="tab-content" id="tab-export">
    <div class="section-header"><h2>数据导出</h2></div>
    <button class="btn btn-primary" onclick="downloadJSON('products')">导出产品数据 (JSON)</button>
    <button class="btn btn-outline" onclick="downloadJSON('services')" style="margin-left:8px">导出服务数据 (JSON)</button>
    <button class="btn btn-outline" onclick="downloadJSON('config')" style="margin-left:8px">导出网站配置 (JSON)</button>
    <button class="btn btn-accent" onclick="saveToGitHub()" style="margin-left:24px">保存并发布到网站</button>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>系统设置</h3>
    <div class="form-group"><label>GitHub Token</label><input type="password" id="setGHToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div>
    <div class="form-group"><label>修改管理员密码 (留空不修改)</label><input type="password" id="setNewPwd" placeholder="新密码"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('settingsModal')">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h3 id="productModalTitle">添加产品</h3>
    <div class="form-group"><label>产品名称</label><input id="prodName"></div>
    <div class="form-group"><label>分类</label><select id="prodCat"><option value="reagents">试剂与耗材</option><option value="instruments">实验仪器</option></select></div>
    <div class="form-group"><label>子分类 (仪器)</label><input id="prodSubcat" placeholder="如：基因检测"></div>
    <div class="form-group"><label>图标 (emoji)</label><input id="prodIcon" placeholder="🧫"></div>
    <div class="form-group"><label>是否热门</label><select id="prodHot"><option value="0">否</option><option value="1">是</option></select></div>
    <div class="form-group"><label>简介</label><input id="prodSummary"></div>
    <div class="form-group"><label>详细介绍 (支持 HTML)</label><textarea id="prodIntro" rows="4"></textarea></div>
    <div class="form-group"><label>产品特点 (一行一个)</label><div class="feature-list" id="prodFeatures"></div><button class="btn btn-outline" onclick="addFeature('prodFeatures')" style="margin-top:8px">+ 添加特点</button></div>
    <div class="form-group"><label>规格参数 (key : value)</label><div class="spec-list" id="prodSpecs"></div><button class="btn btn-outline" onclick="addSpec('prodSpecs')" style="margin-top:8px">+ 添加规格</button></div>
    <div class="form-group"><label>适用场景</label><textarea id="prodApps" rows="3"></textarea></div>
    <div class="form-group"><label>订购信息</label><input id="prodOrdering"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('productModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="serviceModal">
  <div class="modal">
    <h3 id="serviceModalTitle">添加服务</h3>
    <div class="form-group"><label>服务名称</label><input id="svcName"></div>
    <div class="form-group"><label>编号 (两位)</label><input id="svcNum" placeholder="01"></div>
    <div class="form-group"><label>标签 (英文)</label><input id="svcTag" placeholder="STEM CELL"></div>
    <div class="form-group"><label>图标 (emoji)</label><input id="svcIcon" placeholder="🧫"></div>
    <div class="form-group"><label>摘要</label><input id="svcSummary"></div>
    <div class="form-group"><label>服务流程</label><input id="svcFlow"></div>
    <div class="form-group"><label>详细介绍 (支持 HTML)</label><textarea id="svcIntro" rows="4"></textarea></div>
    <div class="form-group"><label>服务特点 (一行一个)</label><div class="feature-list" id="svcFeatures"></div><button class="btn btn-outline" onclick="addFeature('svcFeatures')" style="margin-top:8px">+ 添加特点</button></div>
    <div class="form-group"><label>规格参数 (key : value)</label><div class="spec-list" id="svcSpecs"></div><button class="btn btn-outline" onclick="addSpec('svcSpecs')" style="margin-top:8px">+ 添加规格</button></div>
    <div class="form-group"><label>适用场景</label><textarea id="svcApps" rows="3"></textarea></div>
    <div class="form-group"><label>交付内容</label><textarea id="svcDeliverables" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('serviceModal')">取消</button>
      <button class="btn btn-primary" onclick="saveService()">保存</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-mask" id="loadingMask">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px">正在保存到 GitHub...</div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>
<div id="statusMsg"></div>

  document.getElementById('prodHot').value = p.hot ? '1' : '0';

  document.getElementById('prodIntro').value = (p.detail && p.detail.intro) || '';

function saveProduct() {

    icon: document.getElementById('prodIcon').value,

// ===== GITHUB SAVE =====
function saveToGitHub() {
  var token = getGHToken();
  if (!token) {
    toast('请先在设置中填入 GitHub Token', 'error');
    showSettings();
    return;
  }
  if (!confirm('确定保存当前数据到 index.html 并发布？')) return;
  
  showLoading(true);
  
  // Build new index.html content from template
  buildAndPush(token).then(function(){
    showLoading(false);
    toast('已发布！刷新网站首页查看更新。', 'success');
  }).catch(function(e){
    showLoading(false);
    toast('发布失败：' + e.message, 'error');
  });
}

async function buildAndPush(token) {
  // Fetch current index.html
  var resp = await fetch('index.html');
  var html = await resp.text();
  
  // Replace data sections
  html = updateProductsInHTML(html);
  html = updateServicesInHTML(html);
  html = updateSEOInHTML(html);
  
  // Push via GitHub API
  var b64 = btoa(unescape(encodeURIComponent(html)));
  var apiBase = 'https://api.github.com/repos/biologia-website/biologia-website';
  
  // Get current SHA
  var getResp = await fetch(apiBase + '/contents/index.html?ref=main', {
    headers: {'Authorization': 'token ' + token}
  });
  var existing = await getResp.json();
  
  // Put new content
  var body = {message: 'update: 后台管理更新网站内容', content: b64, branch: 'main'};
  if (existing.sha) body.sha = existing.sha;
  
  var putResp = await fetch(apiBase + '/contents/index.html', {
    method: 'PUT',
    headers: {'Authorization': 'token ' + token, 'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!putResp.ok) throw new Error(putResp.status + ' ' + (await putResp.text()));
}

function updateProductsInHTML(html) { return html; }
function updateServicesInHTML(html) { return html; }
function updateSEOInHTML(html) {
  html = html.replace(/<title>[^<]*<\/title>/, '<title>' + esc(siteConfigData.seo.title) + '</title>');
  html = html.replace(/<meta name="description" content="[^"]*">/, '<meta name="description" content="' + esc(siteConfigData.seo.description) + '">');
  html = html.replace(/<meta name="keywords" content="[^"]*">/, '<meta name="keywords" content="' + esc(siteConfigData.seo.keywords) + '">');
  return html;
}

// ===== EXPORT =====
function downloadJSON(type) {
  var data, name;
  if (type === 'products') { data = productsData; name = 'biologia_products.json'; }
  else if (type === 'services') { data = servicesData; name = 'biologia_services.json'; }
  else { data = siteConfigData; name = 'biologia_site-config.json'; }
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  downloadBlob(blob, name);
  toast(name + ' 已下载', 'success');
}

function downloadBlob(blob, name) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 100);
}

// ===== UTILITY =====
function esc(s) { if(!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showModal(id) { document.getElementById(id).classList.add('show'); document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('show'); document.body.style.overflow = ''; }
function showLoading(v) { document.getElementById('loadingMask').classList.toggle('show', v); }
function status(msg) { document.getElementById('statusMsg').textContent = msg; }
function toast(msg, type) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

window.onerror = function(msg, url, line, col, err) {
